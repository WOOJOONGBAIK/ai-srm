<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 관리</title>
    <style>
        .board-container { padding: 2rem; }
        .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .board-title { font-size: 24px; font-weight: 600; color: #005EB8; }
        .board-actions { display: flex; gap: 1rem; }
        .btn-primary { padding: 8px 16px; background: #005EB8; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary:hover { background: #004a94; }

        .board-filters { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .filter-row { display: flex; gap: 1rem; align-items: center; }
        .filter-select, .filter-input { padding: 8px; border: 1px solid #e0e0e0; border-radius: 4px; }
        .filter-input { flex: 1; }

        .board-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
        .board-table thead { background: #f8f9fa; }
        .board-table th, .board-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .board-table th { font-weight: 600; color: #333; }
        .board-table tbody tr:hover { background: #f8f9fa; }

        .action-buttons { display: flex; gap: 4px; }
        .btn-edit { padding: 4px 8px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { padding: 4px 8px; background: #dc3545; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="board-container">
        <div class="board-header">
            <h1 class="board-title">📋 게시판 관리</h1>
            <div class="board-actions">
                <button class="btn-primary" onclick="addBoardPost()">새 글 작성</button>
            </div>
        </div>

        <div class="board-filters">
            <div class="filter-row">
                <select class="filter-select" id="categoryFilter">
                    <option value="">전체 카테고리</option>
                    <option value="공지">공지</option>
                    <option value="질문">질문</option>
                    <option value="자유">자유</option>
                </select>
                <input type="text" class="filter-input" id="searchInput" placeholder="제목 검색...">
                <button class="btn-primary" onclick="searchPosts()">검색</button>
            </div>
        </div>

        <table class="board-table">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>카테고리</th>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>작성일</th>
                    <th>조회</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="boardTableBody">
                <!-- 게시글 목록이 동적으로 추가됩니다 -->
            </tbody>
        </table>
    </div>

    <script type="module">
        import { DataTable } from '../../components/table.js';
        import { SearchFilter } from '../../components/table.js';
        import { Modal, showConfirm } from '../../components/modal.js';
        import { Notification } from '../../components/utils.js';

        let table;
        let searchFilter;

        // 전역 모듈 객체 정의
        window.boardModule = {
            init: async (container, supabase) => {
                // 컴포넌트 초기화
                searchFilter = new SearchFilter(
                    container.querySelector('.board-filters'),
                    {
                        searchPlaceholder: '제목 검색...',
                        categories: [
                            { value: '공지', label: '공지' },
                            { value: '질문', label: '질문' },
                            { value: '자유', label: '자유' }
                        ]
                    }
                );

                table = new DataTable(
                    container.querySelector('#boardTableBody'),
                    {
                        columns: [
                            { header: '번호', field: 'id' },
                            { header: '카테고리', field: 'category' },
                            { header: '제목', field: 'title' },
                            { header: '작성자', field: 'author' },
                            {
                                header: '작성일',
                                field: 'date',
                                formatter: (value) => new Date(value).toLocaleDateString('ko-KR')
                            },
                            { header: '조회', field: 'views' }
                        ],
                        actions: [
                            { label: '수정', handler: 'editBoardPost', color: '#28a745' },
                            { label: '삭제', handler: 'deleteBoardPost', color: '#dc3545' }
                        ]
                    }
                );

                // 검색 필터 이벤트
                searchFilter.render(
                    (searchTerm, categoryValue) => {
                        table.filter(searchTerm, 'category', categoryValue);
                    },
                    (categoryValue) => {
                        table.filter('', 'category', categoryValue);
                    }
                );

                await loadBoardPosts(table);
            }
        };

        const loadBoardPosts = async (table) => {
            // 가상 데이터로 게시글 목록 표시
            const mockPosts = [
                { id: 1, category: '공지', title: '시스템 점검 안내', author: '관리자', date: '2024-01-15', views: 125 },
                { id: 2, category: '질문', title: '구매요청 승인 절차 문의', author: '김철수', date: '2024-01-14', views: 45 },
                { id: 3, category: '자유', title: '신년 인사', author: '이영희', date: '2024-01-13', views: 78 },
            ];

            table.setData(mockPosts);
        };

        window.addBoardPost = () => {
            const modal = new Modal({ size: 'large' })
                .setTitle('새 글 작성')
                .setContent(`
                    <form id="boardForm">
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">카테고리</label>
                            <select name="category" style="width: 100%; padding: 8px; border: 1px solid #e0e0e0; border-radius: 4px;">
                                <option value="공지">공지</option>
                                <option value="질문">질문</option>
                                <option value="자유">자유</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">제목</label>
                            <input type="text" name="title" style="width: 100%; padding: 8px; border: 1px solid #e0e0e0; border-radius: 4px;" required>
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">내용</label>
                            <textarea name="content" rows="10" style="width: 100%; padding: 8px; border: 1px solid #e0e0e0; border-radius: 4px; resize: vertical;" required></textarea>
                        </div>
                    </form>
                `)
                .setFooter([
                    { label: '취소' },
                    { label: '저장', handler: () => saveBoardPost(modal), primary: true }
                ])
                .open();
        };

        const saveBoardPost = async (modal) => {
            const form = document.getElementById('boardForm');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);

            // 여기서 실제 저장 로직 구현
            console.log('저장할 데이터:', data);

            Notification.success('게시글이 저장되었습니다.');
            modal.close();
            // 테이블 리프레시
            location.reload();
        };

        window.editBoardPost = (id) => {
            Notification.info(`게시글 ${id} 수정 기능 준비중입니다.`);
        };

        window.deleteBoardPost = (id) => {
            showConfirm(`게시글 ${id}을(를) 삭제하시겠습니까?`, () => {
                Notification.success('삭제되었습니다.');
                // 실제 삭제 로직과 테이블 리프레시
                location.reload();
            });
        };

        window.searchPosts = () => {
            const searchTerm = document.getElementById('searchInput').value;
            const categoryValue = document.getElementById('categoryFilter').value;
            table.filter(searchTerm, 'category', categoryValue);
        };
    </script>
