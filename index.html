<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SRM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  body { background: #f8f9fa; color: #333; min-height: 100vh; line-height: 1.5; }

  /* 헤더 */
  .header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 18px; font-weight: 600; color: #005EB8; }
  .nav { display: flex; gap: 2px; }
  .nav-btn { padding: 8px 16px; border-radius: 4px; border: none; background: none; font-size: 14px; color: #666; cursor: pointer; transition: all 0.2s; }
  .nav-btn:hover { background: #f0f0f0; color: #005EB8; }
  .nav-btn.active { background: #005EB8; color: #fff; }

  /* 메인 랜딩 */
  #landing { display: flex; flex-direction: column; align-items: center; padding: 3rem 1.5rem 2rem; }
  .landing-title { font-size: 32px; font-weight: 600; color: #005EB8; margin-bottom: 8px; }
  .landing-sub { font-size: 16px; color: #666; margin-bottom: 2rem; text-align: center; }

  /* 프롬프트 박스 */
  .prompt-wrap { width: 100%; max-width: 600px; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; }
  .prompt-input { width: 100%; border: none; outline: none; padding: 16px; font-size: 14px; resize: none; font-family: inherit; color: #333; }
  .prompt-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid #f0f0f0; background: #fafafa; }
  .prompt-hint { font-size: 12px; color: #999; }
  .send-btn { background: #005EB8; color: #fff; border: none; border-radius: 4px; padding: 8px 16px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
  .send-btn:hover { background: #004080; }

  /* 칩 */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 600px; margin-bottom: 2.5rem; }
  .chip { font-size: 13px; padding: 8px 16px; border-radius: 20px; border: 1px solid #e0e0e0; background: #fff; color: #666; cursor: pointer; transition: all 0.2s; }
  .chip:hover { border-color: #005EB8; color: #005EB8; }

  /* 모듈 카드 */
  .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; width: 100%; max-width: 800px; }
  .module-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s; }
  .module-card:hover { border-color: #005EB8; box-shadow: 0 2px 8px rgba(0,94,184,0.1); }
  .module-dot { width: 12px; height: 12px; border-radius: 50%; margin: 0 auto 12px; }
  .module-name { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .module-desc { font-size: 13px; color: #999; }

  /* 콘텐츠 영역 */
  #content { display: none; padding: 2rem 1.5rem; max-width: 1200px; margin: 0 auto; }

  /* 상태 표시 */
  #db-status { font-size: 12px; padding: 4px 12px; border-radius: 12px; }
  .status-ok { background: #e8f5e8; color: #2e7d32; }
  .status-err { background: #ffebee; color: #c62828; }
  .status-loading { background: #f5f5f5; color: #9e9e9e; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">HD 현대 <span>SRM</span></div>
  <div class="nav">
    <button class="nav-btn active" onclick="showLanding()">대시보드</button>
    <button class="nav-btn" onclick="loadModule('supplier')">공급망 관리</button>
    <button class="nav-btn" onclick="loadModule('pr')">구매 관리</button>
    <button class="nav-btn" onclick="loadModule('contract')">계약 관리</button>
    <button class="nav-btn" onclick="loadModule('quality')">품질 관리</button>
    <button class="nav-btn" onclick="loadModule('analysis')">분석 리포트</button>
  </div>
  <div id="db-status" class="status-loading">DB 연결중...</div>
</div>

<div id="landing">
  <div class="landing-title">HD 현대 <span>SRM</span></div>
  <div class="landing-sub">공급망 관계 관리 · AI 기반 구매 포털</div>

  <div class="prompt-wrap">
    <textarea class="prompt-input" id="prompt" rows="3"
      placeholder='무엇을 도와드릴까요? 예: "공급망 리스크 분석해줘", "구매요청 현황 보여줘"'></textarea>
    <div class="prompt-footer">
      <span class="prompt-hint">현대자동차 제조 · 구매팀 · Claude Sonnet 4.6</span>
      <button class="send-btn" onclick="handlePrompt()">전송</button>
    </div>
  </div>

  <div class="chips">
    <div class="chip" onclick="setPrompt('공급망 리스크 현황 보여줘')">공급망 리스크 현황</div>
    <div class="chip" onclick="setPrompt('이번달 구매요청 요약해줘')">구매요청 요약</div>
    <div class="chip" onclick="setPrompt('만료 예정 계약 조회해줘')">계약 만료 알림</div>
    <div class="chip" onclick="setPrompt('품질 이슈 현황 보여줘')">품질 이슈 조회</div>
    <div class="chip" onclick="setPrompt('납품 준수율 분석해줘')">납품 준수율 분석</div>
    <div class="chip" onclick="setPrompt('KPI 대시보드 보여줘')">KPI 대시보드</div>
  </div>

  <div class="module-grid">
    <div class="module-card" onclick="loadModule('supplier')">
      <div class="module-dot" style="background:#005EB8;"></div>
      <div class="module-name">공급망 관리</div>
      <div class="module-desc">협력사 등록·평가·리스크</div>
    </div>
    <div class="module-card" onclick="loadModule('pr')">
      <div class="module-dot" style="background:#1D9E75;"></div>
      <div class="module-name">구매 관리</div>
      <div class="module-desc">PR·PO·승인 프로세스</div>
    </div>
    <div class="module-card" onclick="loadModule('contract')">
      <div class="module-dot" style="background:#EF9F27;"></div>
      <div class="module-name">계약 관리</div>
      <div class="module-desc">계약 등록·만료 알림</div>
    </div>
    <div class="module-card" onclick="loadModule('quality')">
      <div class="module-dot" style="background:#D85A30;"></div>
      <div class="module-name">품질 관리</div>
      <div class="module-desc">품질 검사·이슈 추적</div>
    </div>
    <div class="module-card" onclick="loadModule('analysis')">
      <div class="module-dot" style="background:#6B46C1;"></div>
      <div class="module-name">분석 리포트</div>
      <div class="module-desc">KPI·AI 인사이트</div>
    </div>
  </div>
</div>

<div id="content"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = 'https://zsgigvswnwudlpanpodl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZ2lndnN3bnd1ZGxwYW5wb2RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjUxNTgsImV4cCI6MjA5MTMwMTE1OH0.cW0m3EyXXNcYHwPxCoBazYPbAuwCZgHdGarBMqEAM6k';

  window.supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const status = document.getElementById('db-status');
  try {
    const { error } = await window.supabase.from('lfa1').select('count').limit(1).schema('sap_mm');
    if (error) throw error;
    status.textContent = 'DB 연결됨';
    status.className = 'status-ok';
  } catch(e) {
    status.textContent = 'DB 오류';
    status.className = 'status-err';
    console.error(e);
  }

  window.showLanding = () => {
    document.getElementById('landing').style.display = 'flex';
    document.getElementById('content').style.display = 'none';
    document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  };

  window.loadModule = async (name) => {
    document.getElementById('landing').style.display = 'none';
    const content = document.getElementById('content');
    content.style.display = 'block';
    content.innerHTML = `<p style="color:#868e96;font-size:14px;">모듈 로딩중: ${name}...</p>`;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const map = { supplier:1, pr:2, contract:3, quality:4, analysis:5 };
    document.querySelectorAll('.nav-btn')[map[name]]?.classList.add('active');
    try {
      const mod = await import(`./modules/${name}/index.js`);
      mod.render(content, window.supabase);
    } catch(e) {
      content.innerHTML = `<p style="color:#c92a2a;font-size:14px;">모듈 준비중입니다.</p>`;
    }
  };

  window.setPrompt = (text) => {
    document.getElementById('prompt').value = text;
  };

  window.handlePrompt = () => {
    const text = document.getElementById('prompt').value.trim();
    if (!text) return;
    alert(`준비중: "${text}"\nClaude API 연동 후 동작합니다.`);
  };
</script>
</body>
</html>
