<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI SRM Portal</title>
<style>
  :root {
    /* HD현대 브랜드 컬러 반영 */
    --primary-color: #008138; 
    --primary-dark: #006b2e;
    --bg-body: #f0f2f5;
    --bg-card: #ffffff;
    --text-main: #333333;
    --text-sub: #666666;
    --border-color: #e0e0e0;
    --transition-speed: 0.3s;
  }

  /* 고대비 모드 */
  body.high-contrast {
    --primary-color: #ffff00;
    --bg-body: #000000;
    --bg-card: #1a1a1a;
    --text-main: #ffffff;
    --text-sub: #ffff00;
    --border-color: #ffffff;
  }

  /* 색약모드 */
  body.color-blind {
    --primary-color: #d55e00; 
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
  body { background: var(--bg-body); color: var(--text-main); transition: background var(--transition-speed); min-height: 100vh; overflow-x: hidden; }

  /* Header */
  .header { 
    background: var(--bg-card); padding: 0 2rem; height: 70px; 
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--primary-color);
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  .logo { font-size: 24px; font-weight: 800; color: var(--primary-color); letter-spacing: -1px; }
  .utility-group { display: flex; align-items: center; gap: 20px; font-size: 13px; }

  .mode-switch button { 
    padding: 6px 12px; cursor: pointer; border: 1px solid var(--border-color); 
    background: var(--bg-card); color: var(--text-main); border-radius: 4px; font-weight: bold;
  }
  .mode-switch button:hover { background: var(--primary-color); color: #fff; }

  /* Search Section */
  .search-container { max-width: 1200px; margin: 30px auto 0; padding: 0 20px; }
  .search-bar { display: flex; background: var(--bg-card); border: 2px solid var(--primary-color); border-radius: 30px; overflow: hidden; }
  .search-bar input { flex: 1; border: none; padding: 15px 25px; outline: none; font-size: 16px; background: transparent; }
  .search-btn { background: var(--primary-color); color: #fff; border: none; padding: 0 30px; cursor: pointer; font-weight: bold; }

  /* Layout & Cards */
  .main-layout { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 25px; max-width: 1200px; margin: 30px auto; padding: 0 20px; }
  .card { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; min-height: 480px; transition: transform 0.3s, box-shadow 0.3s; }
  .card:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  .card-header { padding: 20px; border-bottom: 1px solid var(--border-color); }
  .card-header h3 { color: var(--primary-color); font-size: 18px; font-weight: 700; }
  .card-body { padding: 25px; flex: 1; }

  /* Login Form */
  .login-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-card); color: var(--text-main); }
  .login-btn { width: 100%; padding: 16px; background: var(--primary-color); color: #fff; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
  .login-links { margin-top: 20px; font-size: 13.5px; line-height: 2.2; }
  .login-links a { color: var(--text-sub); text-decoration: none; display: block; cursor: pointer; transition: 0.2s; }
  .login-links a:hover { color: var(--primary-color); padding-left: 5px; }

  /* Modal */
  .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(2px); }
  .modal.show { display: block; opacity: 1; }
  .modal-content { background: var(--bg-card); margin: 8% auto; padding: 35px; border-radius: 16px; width: 550px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
  .modal-header { font-size: 22px; font-weight: bold; margin-bottom: 25px; color: var(--primary-color); border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; }
  .close-modal { position: absolute; right: 25px; top: 20px; font-size: 28px; cursor: pointer; color: var(--text-sub); }
  .guide-step { background: rgba(0,129,56,0.05); padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary-color); border-radius: 0 8px 8px 0; }

  .footer { text-align: center; padding: 40px; font-size: 13px; color: #888; border-top: 1px solid var(--border-color); margin-top: 50px; }

  @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body id="mainBody">

<header class="header">
  <div class="logo">AI-SRM PORTAL</div>
  <div class="utility-group">
    <div id="current-info" class="location-info">Seoul, KR | Loading...</div>
    <div class="mode-switch">
      <select id="langSelect" style="padding: 5px; border-radius: 4px;">
        <option value="ko">한국어 (KR)</option>
        <option value="en">English (US)</option>
      </select>
      <button id="contrastBtn" data-ko="고대비" data-en="Contrast">고대비</button>
      <button id="colorblindBtn" data-ko="색약모드" data-en="ColorBlind">색약모드</button>
    </div>
  </div>
</header>

<div class="search-container">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="무엇을 도와드릴까요?" data-i18n-placeholder="search">
    <button class="search-btn" id="searchBtn" data-ko="검색" data-en="Search">검색</button>
  </div>
</div>

<main class="main-layout">
  <section class="card">
    <div class="card-header"><h3 data-ko="로그인" data-en="Login">로그인</h3></div>
    <div class="card-body">
      <input type="text" id="loginId" class="login-input" placeholder="아이디" data-i18n-placeholder="id">
      <input type="password" id="loginPw" class="login-input" placeholder="비밀번호" data-i18n-placeholder="pw">
      <input type="text" id="input-name" class="login-input" placeholder="이름">
      <input type="text" id="input-dept" class="login-input" placeholder="부서">
      <button class="login-btn" id="loginBtn" data-ko="로그인" data-en="Sign In">로그인</button>
      
      <div class="login-links">
        <a id="applyLink" style="font-weight: bold; color: var(--primary-color);">▶ <span data-ko="신규 협력사 등록 신청" data-en="Apply for Partnership">신규 협력사 등록 신청</span></a>
        <a id="regLink">▶ <span data-ko="신규 협력사 등록 안내" data-en="Registration Guide">신규 협력사 등록 안내</span></a>
        <a id="errLink">▶ <span data-ko="로그인 문제 해결" data-en="Login Help">로그인 문제 해결</span></a>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="card-header"><h3 data-ko="공지사항" data-en="Notice">공지사항</h3></div>
    <div class="card-body">
      <div style="font-size: 14.5px; font-weight: bold; margin-bottom: 5px;">[공지] AI-SRM 정기 보안 점검 안내</div>
      <p style="font-size: 12px; color: var(--text-sub); margin-bottom: 15px;">2026-04-23</p>
      <p style="font-size: 13.5px; color: var(--text-sub); line-height: 1.6;" data-ko="서버 안정화를 위한 정기 점검이 진행될 예정입니다." data-en="Regular maintenance is scheduled for server stability.">서버 안정화를 위한 정기 점검이 진행될 예정입니다.</p>
    </div>
  </section>

  <section class="card">
    <div class="card-header"><h3 data-ko="자료실" data-en="Archive">자료실</h3></div>
    <div class="card-body">
      <ul style="list-style: none; font-size: 14px; line-height: 2.5;">
        <li>📁 <span data-ko="2026 협력사 가이드북" data-en="2026 Partner Guide">2026 협력사 가이드북</span></li>
        <li>📁 <span data-ko="전자계약 매뉴얼" data-en="E-Contract Manual">전자계약 매뉴얼</span></li>
      </ul>
    </div>
  </section>
</main>

<div id="regModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" id="regClose">&times;</span>
    <div class="modal-header" data-ko="신규 협력사 등록 절차" data-en="Registration Process">신규 협력사 등록 절차</div>
    <div id="regStepContainer" class="modal-body"></div>
  </div>
</div>

<footer class="footer">&copy; 2026 AI-SRM Portal. All Rights Reserved.</footer>

<script>
  const i18nData = {
    ko: {
      search: "무엇을 도와드릴까요?",
      id: "아이디",
      pw: "비밀번호",
      regSteps: ["기본 정보 입력", "서류 제출", "심사 진행", "최종 승인"],
      applyMsg: "신규 등록 신청 페이지로 이동하시겠습니까?"
    },
    en: {
      search: "How can we help you?",
      id: "User ID",
      pw: "Password",
      regSteps: ["Enter Info", "Submit Docs", "Reviewing", "Final Approval"],
      applyMsg: "Would you like to proceed to the registration page?"
    }
  };

  function updateLanguage() {
    const lang = document.getElementById('langSelect').value;
    document.querySelectorAll('[data-ko]').forEach(el => {
      el.textContent = el.getAttribute(`data-${lang}`);
    });
    const placeholders = i18nData[lang];
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      el.placeholder = placeholders[key];
    });
    renderModalSteps(lang);
  }

  function renderModalSteps(lang) {
    const container = document.getElementById('regStepContainer');
    if(container) {
      container.innerHTML = i18nData[lang].regSteps
        .map((step, i) => `<div class="guide-step"><strong>STEP ${i+1}</strong>: ${step}</div>`).join('');
    }
  }

  /* 2. 시간 영문으로 fix (en-US 포맷) */
  function updateClock() {
    const now = new Date();
    const options = { 
        year: 'numeric', month: 'short', day: 'numeric', 
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false 
    };
    document.getElementById('current-info').textContent = `Seoul, KR | ${now.toLocaleString('en-US', options)}`;
  }

  function handleLogin() {
    const userName = document.getElementById('input-name').value;
    const userDept = document.getElementById('input-dept').value;

    localStorage.setItem('userName', userName);
    localStorage.setItem('userDept', userDept);

    location.href = 'main.html';
  }

  /* 1. 로그인 시 main으로 연결 (어디서든 작동하는 상대 경로) */
  document.addEventListener('click', (e) => {
    const target = e.target.closest('a, button, .close-modal');
    if (!target) return;

    if (target.id === 'loginBtn') {
      handleLogin();
    } 
    else if (target.id === 'applyLink') {
      const lang = document.getElementById('langSelect').value;
      if(confirm(i18nData[lang].applyMsg)) alert("신규 신청 페이지 연결 중...");
    }
    else if (target.id === 'regLink') openModal('regModal');
    else if (target.classList.contains('close-modal')) closeModal(target.closest('.modal').id);
  });

  function openModal(id) {
    const m = document.getElementById(id);
    m.style.display = "block";
    setTimeout(() => m.classList.add('show'), 10);
  }
  function closeModal(id) {
    const m = document.getElementById(id);
    m.classList.remove('show');
    setTimeout(() => m.style.display = "none", 300);
  }

  document.getElementById('contrastBtn').addEventListener('click', () => document.body.classList.toggle('high-contrast'));
  document.getElementById('colorblindBtn').addEventListener('click', () => document.body.classList.toggle('color-blind'));
  document.getElementById('langSelect').addEventListener('change', updateLanguage);

  // 초기화
  updateLanguage();
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
